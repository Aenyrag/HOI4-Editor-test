<!-- 项目文件管理窗口 -->
<div class="pm-overlay" id="pmOverlay">
    <div class="pm-window" id="pmWindow">
        <!-- 标题栏 -->
        <div class="pm-header">
            <span class="pm-title" id="pmTitle">打开项目</span>
            <button class="pm-close-btn" id="pmCloseBtn" title="关闭">×</button>
        </div>

        <!-- 内容区 -->
        <div class="pm-body">
            <div class="pm-path-row">
                <input type="text" class="pm-path-input" id="pmPathInput" placeholder="请输入项目路径...">
                <button class="pm-browse-btn" id="pmBrowseBtn" title="浏览">📂</button>
            </div>
        </div>

        <!-- 底部按钮区 -->
        <div class="pm-footer">
            <button class="pm-btn pm-btn-secondary" id="pmCancelBtn">取消</button>
            <button class="pm-btn pm-btn-primary" id="pmActionBtn">打开</button>
        </div>
    </div>
</div>
