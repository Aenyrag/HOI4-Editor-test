<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" type="text/css" href="styles.css">
</head>
<body>
    <!-- 主容器：四部分布局 -->
    <div class="app-container" id="appContainer">
        <!-- 1. 最高优先级：左工作区 -->
        <div class="left-workspace" id="leftWorkspace">
            <div class="corner-block"></div>
            <div class="menu-button" id="menuButton"></div>
            <div class="left-content">
                <!-- 内容由 main.js 初始化 -->
            </div>
        </div>

        <!-- 中间区域容器 -->
        <div class="center-area">
            <!-- 4. 最次级：基础页面（嵌入focus-editor.html） -->
            <div class="base-page" id="basePage">
                <iframe src="Focus-Editor/focus-editor.html" id="baseFrame"></iframe>
            </div>

            <!-- 2. 次级：底部工作区 -->
            <div class="bottom-workspace" id="bottomWorkspace">
                <div class="bottom-content">
                    <!-- 内容由 main.js 初始化 -->
                </div>
            </div>
        </div>

        <!-- 3. 再次级：右工作区 -->
        <div class="right-workspace" id="rightWorkspace">
            <div class="right-content">
                <!-- 内容由 main.js 初始化 -->
            </div>
        </div>
    </div>

    <!-- 先加载 Workpage_manager，再加载 main -->
    <script src="workpage_manager.js"></script>
    <script src="main.js"></script>
</body>
</html>
