<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" type="text/css" href="styles.css">
    <link rel="stylesheet" type="text/css" href="menu-button/menu-styles.css">
    <link rel="stylesheet" type="text/css" href="project-manager-windows/Manager-windows-styles.css">
</head>
<script src="utils/loader.js"></script>
<body>
    <!-- 主容器：四部分布局 -->
    <div class="app-container" id="appContainer">
        <!-- 1. 最高优先级：左工作区 -->
        <div class="left-workspace" id="leftWorkspace">
            <div class="corner-block" id="corner-block">
                <div class="menu-button" id="menuButton">
                    <!-- 下拉菜单 -->
                    <div data-load="./menu-button/menu.html" ></div>
                </div>
            </div>
            <div class="left-content">
                <!-- 内容由 main.js 初始化 -->
            </div>
        </div>

        <!-- 中间区域容器 -->
        <div class="center-area">
            <!-- 4. 最次级：基础页面（嵌入focus-editor.html） -->
            <div class="base-page" id="basePage">
                <embed src="Focus-Editor/focus-editor.html" width="100%" height="100%">
            </div>

            <!-- 2. 次级：底部工作区 -->
            <div class="bottom-workspace" id="bottomWorkspace">
                <div class="bottom-content">
                    <!-- 内容由 main.js 初始化 -->
                </div>
            </div>
        </div>

        <!-- 3. 再次级：右工作区 -->
        <div class="right-workspace" id="rightWorkspace">
            <div class="right-content">
                <!-- 内容由 main.js 初始化 -->
            </div>
        </div>
    </div>

    <!-- 项目文件管理窗口 -->
    <div data-load="./Project-manager-windows/Project-Manager-windows.html" style="display: contents;"></div>

    <!-- 先加载 Workpage_manager，再加载 main -->
    <script src="workpage_manager.js"></script>
    <script src="main.js"></script>
    <script src="menu-button/menu-control.js"></script>
    <script src="project-manager-windows/Project-Manager-windows.js"></script>
</body>
</html>
